# Netlify builds the web UI from the repo root (GitHub integration).
# Set Supabase anon URL/key in Netlify → Site → Environment variables (VITE_*).

[build]
  command = "npm ci && npm run build"
  publish = "apps/web/dist"

[build.environment]
  NODE_VERSION = "20"
  # Magic links must return volunteers to the deployed host (not localhost).
  VITE_APP_ORIGIN = "https://campose.netlify.app"
